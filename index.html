<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Viáticos Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .viatico-cell {
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
        }
        .viatico-cell:hover {
            background-color: #e8f0fe;
        }
        .viatico-off {
            color: #9ca3af;
            text-decoration: line-through;
            background-color: #f9fafb !important;
        }
        @media print {
            .no-print { display: none; }
        }
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 50;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
        }
        /* Table styling to match reference */
        .viaticos-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.85rem;
        }
        .viaticos-table th, .viaticos-table td {
            border: 1px solid #cbd5e1;
            padding: 6px 10px;
            text-align: center;
            vertical-align: middle;
        }
        .viaticos-table th {
            background-color: #f1f5f9;
            font-weight: 700;
            color: #374151;
        }
        .viaticos-table td.label-col {
            text-align: left;
        }
        .viaticos-table input[type="time"],
        .viaticos-table input[type="date"],
        .viaticos-table input[type="text"] {
            background: transparent;
            border: none;
            outline: none;
            text-align: center;
            width: 100%;
            font-size: 0.82rem;
            font-family: inherit;
            color: inherit;
        }
        .viaticos-table input[type="text"].justif-input {
            text-align: left;
        }
        .amount-cell {
            font-weight: 600;
            color: #1d4ed8;
            white-space: nowrap;
        }
        .total-cell {
            font-weight: 700;
            color: #1e3a5f;
            white-space: nowrap;
        }
        .grand-total-row td {
            background-color: #f1f5f9;
            font-weight: 700;
        }
        /* Title rows */
        .title-row td {
            background-color: #f8fafc;
            font-weight: 700;
            font-size: 1rem;
            color: #1e3a5f;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">

    <div id="loading" class="loading-overlay flex">Generando archivo...</div>

    <div class="max-w-7xl mx-auto">
        <!-- Configuración Global -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8 no-print border-t-4 border-blue-600">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                <span>📋</span> Gestor de Viáticos
            </h1>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Costo Desayuno (₡)</label>
                    <input type="number" id="globalDesayuno" value="4200" onchange="updateGlobalPrices()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Costo Almuerzo (₡)</label>
                    <input type="number" id="globalAlmuerzo" value="5600" onchange="updateGlobalPrices()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Costo Cena (₡)</label>
                    <input type="number" id="globalCena" value="5600" onchange="updateGlobalPrices()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
                </div>
                <div class="flex gap-2">
                    <button onclick="addNewTable()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition font-bold flex-1">
                        + Nueva Tabla
                    </button>
                </div>
            </div>

            <div class="mt-6 flex flex-wrap gap-4 border-t pt-4">
                <button onclick="exportData()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded">
                    📥 Descargar JSON
                </button>
                <label class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded cursor-pointer">
                    📤 Subir JSON
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                </label>
                <button onclick="resetAll()" class="text-sm bg-red-100 hover:bg-red-200 text-red-600 px-3 py-1 rounded">
                    🗑️ Borrar Todo
                </button>
            </div>
        </div>

        <!-- Tablas -->
        <div id="tablesContainer" class="space-y-10"></div>

        <div id="emptyState" class="hidden text-center py-20 text-gray-500">
            <p class="text-xl">No hay tablas activas.</p>
        </div>
    </div>

    <script>
        let appData = {
            config: { desayuno: 4200, almuerzo: 5600, cena: 5600 },
            tables: []
        };

        const STORAGE_KEY = 'viaticos_full_data_v5';

        window.onload = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                appData = JSON.parse(saved);
                document.getElementById('globalDesayuno').value = appData.config.desayuno;
                document.getElementById('globalAlmuerzo').value = appData.config.almuerzo;
                document.getElementById('globalCena').value = appData.config.cena;
            } else {
                addNewTable();
            }
            render();
            document.getElementById('loading').style.display = 'none';
        };

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        }

        function updateGlobalPrices() {
            appData.config.desayuno = parseFloat(document.getElementById('globalDesayuno').value) || 0;
            appData.config.almuerzo = parseFloat(document.getElementById('globalAlmuerzo').value) || 0;
            appData.config.cena = parseFloat(document.getElementById('globalCena').value) || 0;
            save();
            render();
        }

        function getStartOfWeek() {
            const now = new Date();
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(now.setDate(diff));
        }

        function addNewTable() {
            const startDate = getStartOfWeek();
            const days = [];
            for (let i = 0; i < 5; i++) {
                const d = new Date(startDate);
                d.setDate(startDate.getDate() + i);
                days.push({
                    date: d.toISOString().split('T')[0],
                    hrSalida: '',
                    hrLlegada: '',
                    desayuno: true,
                    almuerzo: true,
                    cena: true
                });
            }
            appData.tables.push({
                id: Date.now(),
                nombre: '',
                placa: '',
                justificacion: '',
                days
            });
            save();
            render();
        }

        function removeTable(id) {
            if (confirm('¿Eliminar esta tabla?')) {
                appData.tables = appData.tables.filter(t => t.id !== id);
                save();
                render();
            }
        }

        function addDay(tableId, position) {
            const table = appData.tables.find(t => t.id === tableId);
            if (!table) return;
            const targetDate = position === 'left'
                ? new Date(table.days[0].date)
                : new Date(table.days[table.days.length - 1].date);
            targetDate.setDate(targetDate.getDate() + (position === 'left' ? -1 : 1));
            const newDay = {
                date: targetDate.toISOString().split('T')[0],
                hrSalida: '',
                hrLlegada: '',
                desayuno: true,
                almuerzo: true,
                cena: true
            };
            position === 'left' ? table.days.unshift(newDay) : table.days.push(newDay);
            save();
            render();
        }

        function removeDay(tableId, dayIndex) {
            const table = appData.tables.find(t => t.id === tableId);
            if (!table || table.days.length <= 1) return;
            table.days.splice(dayIndex, 1);
            save();
            render();
        }

        function toggleViatico(tableId, dayIndex, type) {
            const table = appData.tables.find(t => t.id === tableId);
            if (table) {
                table.days[dayIndex][type] = !table.days[dayIndex][type];
                save();
                render();
            }
        }

        function updateField(tableId, field, value) {
            const table = appData.tables.find(t => t.id === tableId);
            if (!table) return;
            table[field] = value;
            save();
            if (field === 'nombre') {
                const el = document.getElementById(`nombre-display-${tableId}`);
                if (el) el.innerHTML = value
                    ? value
                    : '<span style="color:#9ca3af; font-weight:400;">Nombre del Funcionario</span>';
            }
            if (field === 'justificacion') {
                const el = document.getElementById(`justif-display-${tableId}`);
                if (el) el.innerHTML = value
                    ? value
                    : '<em style="color:#9ca3af;">Sin justificación</em>';
            }
            if (field === 'placa') {
                const elements = document.querySelectorAll(`.placa-display-${tableId}`);
                elements.forEach(el => {
                    el.innerText = value;
                });
            }
        }

        function updateDayField(tableId, dayIndex, field, value) {
            const table = appData.tables.find(t => t.id === tableId);
            if (table) {
                if (field === 'date' && value) {
                    // Calcular el desplazamiento en días entre la fecha anterior y la nueva
                    const oldDate = new Date(table.days[dayIndex].date + 'T00:00:00');
                    const newDate = new Date(value + 'T00:00:00');
                    const diffMs = newDate - oldDate;
                    const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));

                    // Actualizar todas las fechas desplazándolas el mismo número de días
                    table.days.forEach((day, i) => {
                        const d = new Date(day.date + 'T00:00:00');
                        d.setDate(d.getDate() + diffDays);
                        table.days[i].date = d.toISOString().split('T')[0];
                    });
                } else {
                    table.days[dayIndex][field] = value;
                }
                save();
                if (field === 'date') render();
            }
        }

        function calculateTableTotal(table) {
            return table.days.reduce((acc, day) => {
                let dayTotal = 0;
                if (day.desayuno) dayTotal += appData.config.desayuno;
                if (day.almuerzo) dayTotal += appData.config.almuerzo;
                if (day.cena) dayTotal += appData.config.cena;
                return acc + dayTotal;
            }, 0);
        }

        function calculateDayTotal(day) {
            let t = 0;
            if (day.desayuno) t += appData.config.desayuno;
            if (day.almuerzo) t += appData.config.almuerzo;
            if (day.cena) t += appData.config.cena;
            return t;
        }

        function formatAmount(val) {
            return '₡\u00a0' + val.toLocaleString('es-CR');
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('es-CR');
        }

        function shareWhatsApp(tableId) {
            const table = appData.tables.find(t => t.id === tableId);
            const total = calculateTableTotal(table);
            const roundedTotal = Math.floor(total / 1000) * 1000;

            let message = `*DETALLE DE VIÁTICOS*\n`;
            if (table.nombre) message += `👤 *Funcionario:* ${table.nombre}\n`;
            if (table.placa) message += `🚗 *Vehículo/Placa:* ${table.placa || 'Sin placa'}\n`;
            if (table.justificacion) message += `📌 *Justificación:* ${table.justificacion}\n`;
            message += `💰 *Precios:* D: ₡${appData.config.desayuno.toLocaleString('es-CR')} | A: ₡${appData.config.almuerzo.toLocaleString('es-CR')} | C: ₡${appData.config.cena.toLocaleString('es-CR')}\n`;
            message += `----------------------------\n`;

            table.days.forEach(day => {
                const daySum = calculateDayTotal(day);
                if (daySum > 0) {
                    const dateObj = new Date(day.date + 'T00:00:00');
                    const dayName = dateObj.toLocaleDateString('es-CR', { weekday: 'long' });
                    message += `*${dateObj.toLocaleDateString('es-CR')} (${dayName})*\n`;
                    if (day.hrSalida) message += `  Salida: ${day.hrSalida}\n`;
                    if (day.hrLlegada) message += `  Llegada: ${day.hrLlegada}\n`;
                    let items = [];
                    if (day.desayuno) items.push('Desayuno');
                    if (day.almuerzo) items.push('Almuerzo');
                    if (day.cena) items.push('Cena');
                    message += `  ${items.join(' | ')}\n`;
                    message += `  Subtotal: ₡${daySum.toLocaleString('es-CR')}\n\n`;
                }
            });

            message += `----------------------------\n`;
            message += `💰 *TOTAL: ₡${total.toLocaleString('es-CR')}*\n`;
            message += `🏦 *Para el banco (miles): ₡${roundedTotal.toLocaleString('es-CR')}*\n`;
            message += `_Enviado desde Gestor de Viáticos_`;

            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`, '_blank');
        }

        async function downloadTableImage(tableId) {
            const element = document.getElementById(`table-card-${tableId}`);
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            const buttons = element.querySelectorAll('.no-capture');
            buttons.forEach(b => b.style.display = 'none');

            try {
                const canvas = await html2canvas(element, { backgroundColor: '#ffffff', scale: 2 });
                const link = document.createElement('a');
                link.download = `viaticos_${tableId}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) { console.error(err); }
            finally {
                buttons.forEach(b => b.style.display = 'flex');
                loading.style.display = 'none';
            }
        }

        function render() {
            const container = document.getElementById('tablesContainer');
            const emptyState = document.getElementById('emptyState');
            if (appData.tables.length === 0) {
                emptyState.classList.remove('hidden');
                container.innerHTML = '';
                return;
            }
            emptyState.classList.add('hidden');

            container.innerHTML = appData.tables.map(table => {
                const total = calculateTableTotal(table);

                const dayRows = table.days.map((day, idx) => {
                    const dayTotal = calculateDayTotal(day);
                    const desayunoOff = !day.desayuno;
                    const almuerzoOff = !day.almuerzo;
                    const cenaOff = !day.cena;
                    const dateObj = new Date(day.date + 'T00:00:00');
                    const diaSemana = day.date ? dateObj.toLocaleDateString('es-CR', { weekday: 'short' }).replace('.','') : '';

                    return `
                    <tr>
                        <td>
                            <input type="date" value="${day.date}"
                                onchange="updateDayField(${table.id}, ${idx}, 'date', this.value)"
                                style="min-width:105px">
                        </td>
                        <td style="font-size:0.75rem; color:#6b7280; font-weight:600; text-transform:capitalize; white-space:nowrap;">${diaSemana}</td>
                        <td>
                            <input type="time" value="${day.hrSalida || ''}" placeholder="--:--"
                                onchange="updateDayField(${table.id}, ${idx}, 'hrSalida', this.value)"
                                style="min-width:70px">
                        </td>
                        <td>
                            <input type="time" value="${day.hrLlegada || ''}" placeholder="--:--"
                                onchange="updateDayField(${table.id}, ${idx}, 'hrLlegada', this.value)"
                                style="min-width:70px">
                        </td>
                        <td class="viatico-cell amount-cell ${desayunoOff ? 'viatico-off' : ''}"
                            onclick="toggleViatico(${table.id}, ${idx}, 'desayuno')"
                            title="Clic para activar/desactivar">
                            ${day.desayuno ? formatAmount(appData.config.desayuno) : '--'}
                        </td>
                        <td class="viatico-cell amount-cell ${almuerzoOff ? 'viatico-off' : ''}"
                            onclick="toggleViatico(${table.id}, ${idx}, 'almuerzo')"
                            title="Clic para activar/desactivar">
                            ${day.almuerzo ? formatAmount(appData.config.almuerzo) : '--'}
                        </td>
                        <td class="viatico-cell amount-cell ${cenaOff ? 'viatico-off' : ''}"
                            onclick="toggleViatico(${table.id}, ${idx}, 'cena')"
                            title="Clic para activar/desactivar">
                            ${day.cena ? formatAmount(appData.config.cena) : '--'}
                        </td>
                        <td class="total-cell">${dayTotal > 0 ? formatAmount(dayTotal) : '--'}</td>
                        <td class="placa-display-${table.id}">${table.placa || ''}</td>
                        <td class="no-capture" style="min-width:30px; text-align:center;">
                            <button onclick="removeDay(${table.id}, ${idx})" 
                                style="color:#ef4444; background:none; border:none; cursor:pointer; font-size:1rem;" 
                                title="Eliminar día">✕</button>
                        </td>
                    </tr>`;
                }).join('');

                return `
                <div id="table-card-${table.id}" class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                    
                    <!-- Toolbar -->
                    <div class="bg-gray-50 p-4 border-b flex flex-wrap justify-between items-center gap-4 no-capture">
                        <div class="flex items-center gap-4 flex-wrap">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase block">Nombre del Funcionario</label>
                                <input type="text" value="${table.nombre || ''}" placeholder="Nombre completo"
                                    oninput="updateField(${table.id}, 'nombre', this.value)"
                                    class="block border-b-2 border-gray-300 focus:border-blue-500 outline-none bg-transparent font-bold text-base w-56">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase block">Vehículo / Placa</label>
                                <input type="text" value="${table.placa || ''}" placeholder="Placa"
                                    oninput="updateField(${table.id}, 'placa', this.value)"
                                    class="block border-b-2 border-gray-300 focus:border-blue-500 outline-none bg-transparent font-bold text-base w-32">
                            </div>
                        </div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <button onclick="shareWhatsApp(${table.id})" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-700 transition shadow-sm flex items-center gap-1">
                                📱 WhatsApp
                            </button>
                            <button onclick="downloadTableImage(${table.id})" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-200 transition border flex items-center gap-1">
                                📸 Imagen
                            </button>
                            <div class="h-8 w-[1px] bg-gray-300 mx-1"></div>
                            <button onclick="addDay(${table.id}, 'left')" class="text-blue-600 hover:bg-blue-50 px-2 py-1 rounded text-xs font-bold border border-blue-200">+ Día arriba</button>
                            <button onclick="addDay(${table.id}, 'right')" class="text-blue-600 hover:bg-blue-50 px-2 py-1 rounded text-xs font-bold border border-blue-200">+ Día abajo</button>
                            <button onclick="removeTable(${table.id})" class="text-red-400 hover:text-red-600 p-2 text-lg">🗑️</button>
                        </div>
                    </div>

                    <!-- Justificación -->
                    <div class="px-4 py-2 border-b bg-white no-capture">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Justificación de la Gira</label>
                        <input type="text" value="${table.justificacion || ''}" placeholder="Ej: Servicios de supervisión técnica para el Proyecto X"
                            oninput="updateField(${table.id}, 'justificacion', this.value)"
                            class="block w-full border-b border-gray-200 focus:border-blue-400 outline-none bg-transparent text-sm text-gray-700 py-1">
                    </div>

                    <!-- Table -->
                    <div class="overflow-x-auto p-4">
                        <table class="viaticos-table">
                            <thead>
                                <tr class="title-row">
                                    <td colspan="10" style="text-align:center; font-size:1.05rem; padding: 8px;">
                                        Viáticos
                                    </td>
                                </tr>
                                <tr class="title-row">
                                    <td colspan="10" style="text-align:center; padding: 6px;">
                                        <span id="nombre-display-${table.id}">${table.nombre || '<span style="color:#9ca3af; font-weight:400;">Nombre del Funcionario</span>'}</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Día</th>
                                    <th>Hr<br>salida</th>
                                    <th>Hr<br>llegada</th>
                                    <th>Desayuno</th>
                                    <th>Almuerzo</th>
                                    <th>Cena</th>
                                    <th>Total</th>
                                    <th>Vehículo</th>
                                    <th class="no-capture" style="width:30px;"></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${dayRows}
                            </tbody>
                            <tfoot>
                                <tr class="grand-total-row">
                                    <td colspan="7" style="text-align:center; font-weight:700; font-size:0.9rem;">Total</td>
                                    <td class="total-cell" style="font-size:1rem; white-space:nowrap;">
                                        ${formatAmount(total)}
                                        <br><span style="font-size:0.72rem; font-weight:400; color:#6b7280;">(${formatAmount(Math.floor(total/1000)*1000)} en miles)</span>
                                    </td>
                                    <td colspan="2"></td>
                                </tr>
                                <tr>
                                    <td colspan="10" style="text-align:left; padding: 6px 10px; font-size:0.8rem; color:#374151;">
                                        <strong>Justificación:</strong> <span id="justif-display-${table.id}">${table.justificacion || '<em style="color:#9ca3af;">Sin justificación</em>'}</span>
                                    </td>
                                </tr>
                            </tfoot>
                        </table>
                        <p class="text-[10px] text-gray-400 mt-2 no-capture">💡 Haz clic en Desayuno, Almuerzo o Cena para activar/desactivar cada uno.</p>
                    </div>
                </div>`;
            }).join('');
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "viaticos_backup.json");
            dl.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                appData = JSON.parse(e.target.result);
                save();
                location.reload();
            };
            reader.readAsText(file);
        }

        function resetAll() {
            if (confirm('¿Borrar todo?')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }
    </script>
</body>
</html>
